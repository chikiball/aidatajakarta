# ═══════════════════════════════════════════════════════════
# /home/nandha/server/docker-compose.yml
# Gateway stack: Nginx reverse proxy + Cloudflare Tunnel
#
# Traffic flow:
#   Internet → Cloudflare Edge → cloudflared tunnel → nginx → app
#
# ZERO ports exposed to the internet.
# nginx only listens on the Docker network (not host).
# ═══════════════════════════════════════════════════════════

services:

  # ─── Cloudflare Tunnel ───
  # Creates an outbound-only encrypted tunnel to Cloudflare.
  # No inbound ports needed — your home IP stays hidden.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - server-net
    depends_on:
      - nginx

  # ─── Nginx Gateway ───
  # NOT exposed to host — only reachable via cloudflared on server-net.
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: unless-stopped
    # No 'ports:' — intentionally not exposed to host network.
    # Only cloudflare-tunnel can reach it on server-net.
    expose:
      - "80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - server-net

networks:
  server-net:
    name: server-net
    driver: bridge
    internal: false  # containers can reach the internet (for API fetches)
