services:
  app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-aidatajakarta}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8081}:8080"
    volumes:
      - app-data:/app/data
      - app-models:/app/models
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/update-status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  app-data:
  app-models:
