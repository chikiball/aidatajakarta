# ═══════════════════════════════════════════
# Hardened Nginx main config
# /home/nandha/server/nginx/nginx.conf
# ═══════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Hide Nginx version ───
    server_tokens off;

    # ─── Logging ───
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
    gzip_vary on;

    # ─── Rate Limiting ───
    # 10 requests/sec per IP with burst of 20 (queued)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Stricter limit for API endpoints: 5 requests/sec
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # Limit connections per IP
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # Return 429 (not 503) when rate limited
    limit_req_status 429;
    limit_conn_status 429;

    # ─── Request size limits ───
    client_max_body_size 1m;         # No file uploads expected
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ─── Timeouts ───
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;

    # ─── Security headers (applied globally) ───
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ─── Block common bad bots ───
    map $http_user_agent $bad_bot {
        default 0;
        ~*sqlmap        1;
        ~*nikto         1;
        ~*nmap          1;
        ~*dirbuster     1;
        ~*masscan       1;
        ~*python-requests 0;   # allow — our app uses requests internally
    }

    # ─── Include per-site configs ───
    include /etc/nginx/conf.d/*.conf;
}
