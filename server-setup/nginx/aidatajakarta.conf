# ──────────────────────────────────────────
# Jakarta AI Transport — hardened site config
# Traffic: cloudflared → nginx-gateway → aidatajakarta:8080
# ──────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ─── Block bad bots (defined in nginx.conf) ───
    if ($bad_bot) { return 403; }

    # ─── Block suspicious paths ───
    location ~* /(\.env|\.git|wp-admin|wp-login|phpmyadmin|\.php|cgi-bin) {
        return 404;
    }

    # ─── Main site — general rate limit ───
    location / {
        limit_req   zone=general burst=20 nodelay;
        limit_conn  connlimit 30;

        proxy_pass http://aidatajakarta:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ─── API endpoints — stricter rate limit ───
    location /api/ {
        limit_req   zone=api burst=10 nodelay;
        limit_conn  connlimit 10;

        proxy_pass http://aidatajakarta:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── POST endpoint — most restrictive (1 req/sec) ───
    location = /api/update-now {
        limit_req zone=api burst=2 nodelay;

        proxy_pass http://aidatajakarta:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static assets — cached, less restricted ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://aidatajakarta:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health check (internal only) ───
    location = /health {
        access_log off;
        proxy_pass http://aidatajakarta:8080/api/update-status;
    }
}
