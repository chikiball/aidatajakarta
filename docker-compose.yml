services:
  app:
    build: .
    container_name: aidatajakarta
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - app-data:/app/data
      - app-models:/app/models
    environment:
      - PORT=8080
    networks:
      - server-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/update-status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  app-data:
  app-models:

networks:
  server-net:
    external: true
